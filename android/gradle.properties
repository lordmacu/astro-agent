org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Compile Kotlin inside the Gradle daemon (no separate Kotlin daemon). Fixes
# "Connection to the Kotlin daemon has been unexpectedly lost" crashes under
# memory pressure on this machine.
kotlin.compiler.execution.strategy=in-process
