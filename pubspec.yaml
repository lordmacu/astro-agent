name: astro
description: "Astro - AI pet for the car"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management and reactive streams.
  flutter_riverpod: ^2.6.1
  rxdart: ^0.28.0

  # Immutable models / JSON.
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # LLM transport (ported brain).
  http: ^1.2.2

  # Loads the API key from .env at runtime, so any `flutter run` works without
  # passing --dart-define every time.
  flutter_dotenv: ^5.1.0

  # Long-term memory (ported from nexo-rs, SQLite-backed). We run SQLite through
  # ffi with a bundled libsqlite3 (sqlite3_flutter_libs) so FTS5 is always
  # available — some devices' system SQLite ships without it. sqflite stays for
  # getDatabasesPath().
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  sqlite3_flutter_libs: ^0.5.24
  uuid: ^4.5.1

  # Small key-value persistence (e.g. the learned forward-axis calibration).
  shared_preferences: ^2.3.2

  # SMTP client (Dart, no native) for the send_email tool.
  mailer: ^6.1.0
  # IMAP client (Dart) for the read_email tool.
  enough_mail: ^2.1.6
  # Battery level/charging for get_context.
  battery_plus: ^6.0.3

  # Camera capture for the take_photo tool (headless: init controller, capture,
  # dispose — no preview widget). gal saves the shot to the phone gallery.
  camera: ^0.11.0+2
  gal: ^2.3.1

  # Phone sensors.
  sensors_plus: ^6.1.1
  light: ^5.0.0
  # Proximity is read via our own native EventChannel (astro/proximity), using
  # Android's `value < maxRange` test — the proximity_sensor plugin's `== 0`
  # never fired on OEM "Palm" proximity sensors. Touch press-and-hold is the
  # universal caress fallback on phones with no usable proximity sensor.
  geolocator: ^13.0.2
  # Reverse-geocode the GPS fix into a place name for the get_context tool.
  geocoding: ^3.0.0
  # Adjust screen brightness for the device tool (own window, no perm).
  screen_brightness: ^2.1.1

  # Action tools: launch Maps/dialer/WhatsApp (navigate, phone), fire system
  # intents (timer/alarm), toggle the flashlight (device), resolve contacts.
  url_launcher: ^6.3.0
  android_intent_plus: ^5.2.0
  torch_light: ^1.1.0
  flutter_contacts: ^1.1.9+2

  # Voice — simple system TTS (lightweight), active now.
  flutter_tts: ^4.2.0

  # Wake word / speech-to-text (stopgap; Porcupine is the low-power upgrade).
  speech_to_text: ^7.0.0

  # Offline, on-device STT (Vosk) — continuous recognition, no network, no
  # mid-sentence cutting. Falls back to speech_to_text when the model is absent.
  vosk_flutter_2: ^1.0.5
  permission_handler: ^11.4.0

  # Offline NEURAL TTS (sherpa-onnx + Piper) — PARKED to keep the APK small: its
  # onnxruntime native libs add ~70MB per ABI. Astro speaks with the system TTS
  # (SystemTts) for now. To re-enable: uncomment sherpa_onnx + audioplayers,
  # rename lib/voice/sherpa_tts.dart.off back to .dart, and restore the neural
  # branches in tts_provider.dart / pet_screen.dart and the Settings UI.
  # sherpa_onnx: ^1.10.0
  # audioplayers: ^6.1.0
  # Kept: used by the neural-voice installer (download/unzip) which stays in the
  # tree, and elsewhere.
  path_provider: ^2.1.4
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation for freezed / json models.
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # The API keys, read at runtime by flutter_dotenv.
  assets:
    - .env
    # NOTE: the offline STT model (Vosk, ~37MB) is NO LONGER bundled — it's
    # downloaded on demand at app start (see lib/voice/stt_model_provider.dart)
    # to keep the APK small. Until it lands, Astro uses the platform STT.
  # Voice model asset — DISABLED for fast dev builds (65MB). Uncomment to
  # re-enable voice (see lib/voice/tts_provider.dart).
  # assets:
  #   - assets/tts/vits-piper-es_ES-davefx-medium.zip

# App launcher icon (Astro). Regenerate after changing the source with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/astro_icon.png"
  min_sdk_android: 30
  adaptive_icon_background: "#141d2e"
  adaptive_icon_foreground: "assets/icon/astro_icon.png"
